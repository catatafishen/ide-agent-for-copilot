name: CI

on:
  pull_request:
    branches: [ master ]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        run: ./gradlew :plugin-core:buildPlugin --no-daemon

      - name: Run MCP server tests
        run: ./gradlew :mcp-server:test --no-daemon

      - name: Run plugin tests
        run: ./gradlew :plugin-core:test --no-daemon

      - name: Verify plugin (marketplace compatibility)
        run: ./gradlew :plugin-core:verifyPlugin --no-daemon

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-pr-${{ github.event.pull_request.number }}
          path: plugin-core/build/distributions/*.zip
          if-no-files-found: error
          retention-days: 7
